<!DOCTYPE html>
<html>
<head>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>My Professional Agenda</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-primary mb-4">My Pending Tasks</h1>
        <a href="{% url 'create_task' %}" class="btn btn-primary mb-3">Create new task</a>
        
        <div class="card shadow">
            <ul class="list-group list-group-flush">
                {% for task in tasks %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <span class="badge bg-info text-dark">{{ task.category.name }}</span>
                            <strong>{{ task.title }}</strong>: {{ task.description }}
                        </div>
                        <div>
                            <a href="{% url 'edit_task' task.id %}" class="btn btn-sm btn-outline-warning">Edit</a>
                            <a href="{% url 'delete_task' task.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
                            
                            {% if task.is_completed %}
                                <span class="badge bg-success">✅ Done</span>
                            {% else %}
                                <a href="{% url 'complete_task' task.id %}" class="btn btn-sm btn-outline-success">Complete</a>
                            {% endif %}
                        </div>
                    </li>
                {% empty %}
                    <li class="list-group-item">No tasks yet. Keep learning!</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
