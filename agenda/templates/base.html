<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>My Professional Agenda</title>
    <style>
      :root { --main-blue: #0d6efd; } /* Tu azul hermoso definido aquí */
      body { background-color: #f8f9fa; }
      .navbar-brand { color: var(--main-blue) !important; font-weight: bold; }
      .btn-outline-primary { border-color: var(--main-blue); color: var(--main-blue); }
      .btn-outline-primary:hover { background-color: var(--main-blue); color: white; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'task_list' %}">MyAgenda2026</a>
        <div class="d-flex">
          {% if user.is_authenticated %}
            <span class="navbar-text me-3 text-primary">Hola, <strong>{{ user.username }}</strong></span>
            <form action="{% url 'logout' %}" method="post">
              {% csrf_token %}
              <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
            </form>
          {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-info alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    {% if tasks %}
        <script>
          document.addEventListener('DOMContentLoaded', function() {
              {% for task in tasks %}
                  {% if not task.is_completed and task.priority == 'H' %}
                      Swal.fire({
                          title: '¡URGENTE!',
                          text: '{{ task.title|escapejs }} (Falta: {{ task.time_left|escapejs }})',
                          icon: 'warning',
                          toast: true,
                          position: 'top-end',
                          showConfirmButton: true,
                          confirmButtonColor: '#0d6efd',
                          timer: 10000
                      });
                  {% endif %}
              {% endfor %}
          });
        </script>
    {% endif %}
  </body>
</html>
